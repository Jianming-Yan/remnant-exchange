  <line x1="25" y1="24" x2="43" y2="24" stroke="rgba(255,255,255,0.12)" stroke-width="1" stroke-linecap="round"/>
  <line x1="25" y1="30" x2="40" y2="30" stroke="rgba(255,255,255,0.12)" stroke-width="1" stroke-linecap="round"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <!-- Background -->
  <rect width="60" height="60" rx="12" fill="#0f172a"/>

  <!-- Left piece (dark slate) — jagged right edge -->
  <path d="M6,12 L27,12 L24,21 L29,30 L24,39 L27,48 L6,48 Z" fill="#334155"/>
  <!-- Grain lines left piece -->
  <line x1="9" y1="21" x2="22" y2="21" stroke="rgba(255,255,255,0.18)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="9" y1="30" x2="24" y2="30" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-linecap="round"/>
  <line x1="9" y1="39" x2="22" y2="39" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-linecap="round"/>

  <!-- Right piece (blue) — matching jagged left edge, 4px gap -->
  <path d="M31,12 L54,12 L54,48 L31,48 L28,39 L33,30 L28,21 L31,12 Z" fill="#3b82f6"/>
  <!-- Grain lines right piece -->
  <line x1="34" y1="21" x2="51" y2="21" stroke="rgba(255,255,255,0.22)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="34" y1="30" x2="51" y2="30" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-linecap="round"/>
  <line x1="34" y1="39" x2="51" y2="39" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-linecap="round"/>
</svg>

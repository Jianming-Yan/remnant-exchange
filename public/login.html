<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabricator Login | Remnant Exchange</title>
    <meta name="description" content="Log in to your Remnant Exchange account to manage your stone remnant listings.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav>
    <a href="/" class="nav-logo"><img src="/logo-icon.svg" height="56" style="vertical-align:middle;margin-right:10px;">Remnant<span>Exchange</span><span style="color:#93c5fd;font-size:0.68em;font-weight:600;letter-spacing:0;">.org</span></a>
    <div class="nav-links">
        <a href="/register.html" class="btn btn-primary">Register</a>
    </div>
</nav>

<div class="container">
    <div class="form-card">
        <h1>Welcome Back</h1>
        <p class="subtitle">Log in to your Remnant Exchange account.</p>

        <div id="alertBox" style="display:none"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="john@smithcountertops.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Your password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;" id="submitBtn">Log In</button>
        </form>

        <div class="form-link" style="margin-top:12px;"><a href="#" onclick="showForgot()" style="color:#64748b;">Forgot your password?</a></div>
        <div class="form-link">Don't have an account? <a href="/register.html">Register here</a></div>
    </div>

    <!-- FORGOT PASSWORD CARD -->
    <div class="form-card" id="forgotCard" style="display:none;margin-top:16px;">
        <h2 style="margin-bottom:8px;">Reset Password</h2>
        <p class="subtitle">Enter your email and we'll send you a temporary password.</p>
        <div id="forgotAlert" style="display:none"></div>
        <form id="forgotForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="forgotEmail" placeholder="your@email.com" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;" id="forgotBtn">Send Temporary Password</button>
        </form>
        <div class="form-link" style="margin-top:12px;"><a href="#" onclick="showLogin()" style="color:#64748b;">Back to login</a></div>
    </div>
</div>

<script>
    if (localStorage.getItem('token')) {
        window.location.href = '/dashboard.html';
    }

    // Magic link auto-login
    const magicToken = new URLSearchParams(window.location.search).get('magic');
    if (magicToken) {
        (async () => {
            try {
                const res = await fetch(`/api/auth/magic-login?token=${magicToken}`);
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = data.must_change_password ? '/change-password.html' : '/dashboard.html';
                }
            } catch {}
        })();
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const alertBox = document.getElementById('alertBox');
        const submitBtn = document.getElementById('submitBtn');

        submitBtn.disabled = true;
        submitBtn.textContent = 'Logging in...';

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value,
                }),
            });

            const data = await res.json();

            if (!res.ok) {
                alertBox.className = 'alert alert-error';
                alertBox.textContent = data.error;
                alertBox.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Log In';
                return;
            }

            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));

            if (data.must_change_password) {
                window.location.href = '/change-password.html';
            } else if (data.user.role === 'admin') {
                window.location.href = '/admin.html';
            } else {
                window.location.href = '/dashboard.html';
            }
        } catch {
            alertBox.className = 'alert alert-error';
            alertBox.textContent = 'Something went wrong. Please try again.';
            alertBox.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Log In';
        }
    });

    function showForgot() {
        document.querySelector('.form-card').style.display = 'none';
        document.getElementById('forgotCard').style.display = 'block';
    }

    function showLogin() {
        document.querySelector('.form-card').style.display = 'block';
        document.getElementById('forgotCard').style.display = 'none';
    }

    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const forgotAlert = document.getElementById('forgotAlert');
        const forgotBtn = document.getElementById('forgotBtn');
        forgotBtn.disabled = true;
        forgotBtn.textContent = 'Sending...';

        try {
            const res = await fetch('/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: document.getElementById('forgotEmail').value }),
            });
            const data = await res.json();
            if (!res.ok) {
                forgotAlert.className = 'alert alert-error';
                forgotAlert.textContent = data.error;
                forgotAlert.style.display = 'block';
                forgotBtn.disabled = false;
                forgotBtn.textContent = 'Send Temporary Password';
            } else {
                forgotAlert.className = 'alert alert-success';
                forgotAlert.textContent = data.message;
                forgotAlert.style.display = 'block';
                forgotBtn.textContent = 'Sent';
            }
        } catch {
            forgotAlert.className = 'alert alert-error';
            forgotAlert.textContent = 'Something went wrong. Please try again.';
            forgotAlert.style.display = 'block';
            forgotBtn.disabled = false;
            forgotBtn.textContent = 'Send Temporary Password';
        }
    });
</script>

<footer style="text-align:center;padding:32px 24px;color:#94a3b8;font-size:0.85rem;border-top:1px solid #e2e8f0;">
    &copy; 2026 Remnant Exchange &mdash; <a href="/about.html" style="color:#64748b;">About</a> &mdash; <a href="/privacy.html" style="color:#64748b;">Privacy Policy</a>
</footer>
</body>
</html>

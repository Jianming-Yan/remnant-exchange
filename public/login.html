<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabricator Login | Remnant Exchange</title>
    <meta name="description" content="Log in to your Remnant Exchange account to manage your stone remnant listings.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav>
    <a href="/" class="nav-logo"><img src="/logo-icon.svg" height="48" style="vertical-align:middle;margin-right:10px;">Remnant<span>Exchange</span></a>
    <div class="nav-links">
        <a href="/register.html" class="btn btn-primary">Register</a>
    </div>
</nav>

<div class="container">
    <div class="form-card">
        <h1>Welcome Back</h1>
        <p class="subtitle">Log in to your Remnant Exchange account.</p>

        <div id="alertBox" style="display:none"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="john@smithcountertops.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Your password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;" id="submitBtn">Log In</button>
        </form>

        <div class="form-link">Don't have an account? <a href="/register.html">Register here</a></div>
    </div>
</div>

<script>
    if (localStorage.getItem('token')) {
        window.location.href = '/dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const alertBox = document.getElementById('alertBox');
        const submitBtn = document.getElementById('submitBtn');

        submitBtn.disabled = true;
        submitBtn.textContent = 'Logging in...';

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value,
                }),
            });

            const data = await res.json();

            if (!res.ok) {
                alertBox.className = 'alert alert-error';
                alertBox.textContent = data.error;
                alertBox.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Log In';
                return;
            }

            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));

            if (data.user.role === 'admin') {
                window.location.href = '/admin.html';
            } else {
                window.location.href = '/dashboard.html';
            }
        } catch {
            alertBox.className = 'alert alert-error';
            alertBox.textContent = 'Something went wrong. Please try again.';
            alertBox.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Log In';
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password | Remnant Exchange</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav>
    <a href="/" class="nav-logo"><img src="/logo-icon.svg" height="56" style="vertical-align:middle;margin-right:10px;">Remnant<span>Exchange</span><span style="color:#93c5fd;font-size:0.68em;font-weight:600;letter-spacing:0;">.org</span></a>
</nav>

<div class="container">
    <div class="form-card">
        <h1>Set Your Password</h1>
        <p class="subtitle" id="subtitle">Please set a new password before continuing.</p>

        <div id="alertBox" style="display:none"></div>

        <form id="changeForm">
            <div class="form-group">
                <label>Current / Temporary Password</label>
                <input type="password" id="current_password" placeholder="Your temporary password" required>
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="new_password" placeholder="At least 8 characters" required minlength="8">
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirm_password" placeholder="Repeat new password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;" id="submitBtn">Update Password</button>
        </form>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login.html';

    document.getElementById('changeForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const alertBox = document.getElementById('alertBox');
        const submitBtn = document.getElementById('submitBtn');
        const newPw = document.getElementById('new_password').value;
        const confirmPw = document.getElementById('confirm_password').value;

        if (newPw !== confirmPw) {
            alertBox.className = 'alert alert-error';
            alertBox.textContent = 'New passwords do not match.';
            alertBox.style.display = 'block';
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Updating...';

        try {
            const res = await fetch('/api/auth/change-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({
                    current_password: document.getElementById('current_password').value,
                    new_password: newPw,
                }),
            });

            const data = await res.json();

            if (!res.ok) {
                alertBox.className = 'alert alert-error';
                alertBox.textContent = data.error;
                alertBox.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Update Password';
                return;
            }

            alertBox.className = 'alert alert-success';
            alertBox.textContent = 'Password updated! Redirecting...';
            alertBox.style.display = 'block';

            const user = JSON.parse(localStorage.getItem('user') || '{}');
            setTimeout(() => {
                window.location.href = user.role === 'admin' ? '/admin.html' : '/dashboard.html';
            }, 1200);
        } catch {
            alertBox.className = 'alert alert-error';
            alertBox.textContent = 'Something went wrong. Please try again.';
            alertBox.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Update Password';
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Your Stone Remnants Free | Remnant Exchange</title>
    <meta name="description" content="Join Remnant Exchange to list your stone remnants and reach buyers nationwide. Free account for fabricators. Easy setup in minutes.">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav>
    <a href="/" class="nav-logo">Remnant<span>Exchange</span></a>
    <div class="nav-links">
        <a href="/login.html">Login</a>
    </div>
</nav>

<div class="container">
    <div class="form-card">
        <h1>Create Your Account</h1>
        <p class="subtitle">Join as a verified fabricator and start listing your remnants.</p>

        <div id="alertBox" style="display:none"></div>

        <form id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label>Your Name *</label>
                    <input type="text" id="name" placeholder="John Smith" required>
                </div>
                <div class="form-group">
                    <label>Business Name *</label>
                    <input type="text" id="business_name" placeholder="Smith Countertops" required>
                </div>
            </div>
            <div class="form-group">
                <label>Email Address *</label>
                <input type="email" id="email" placeholder="john@smithcountertops.com" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="(555) 000-0000">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" id="password" placeholder="Min. 8 characters" required minlength="8">
                </div>
                <div class="form-group">
                    <label>Confirm Password *</label>
                    <input type="password" id="confirmPassword" placeholder="Repeat password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;" id="submitBtn">Create Account</button>
        </form>

        <div class="form-link">Already have an account? <a href="/login.html">Log in</a></div>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const alertBox = document.getElementById('alertBox');
        const submitBtn = document.getElementById('submitBtn');

        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;

        if (password !== confirm) {
            alertBox.className = 'alert alert-error';
            alertBox.textContent = 'Passwords do not match';
            alertBox.style.display = 'block';
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Creating account...';

        try {
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: document.getElementById('name').value,
                    business_name: document.getElementById('business_name').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    password,
                }),
            });

            const data = await res.json();

            if (!res.ok) {
                alertBox.className = 'alert alert-error';
                alertBox.textContent = data.error;
                alertBox.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
                return;
            }

            alertBox.className = 'alert alert-success';
            alertBox.textContent = data.message;
            alertBox.style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
        } catch {
            alertBox.className = 'alert alert-error';
            alertBox.textContent = 'Something went wrong. Please try again.';
            alertBox.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Create Account';
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outreach Dashboard — Remnant Exchange</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .filter-btn { padding:6px 14px; border:1.5px solid #e2e8f0; border-radius:20px; background:white; font-size:0.82rem; font-weight:600; cursor:pointer; color:#64748b; transition:all 0.15s; }
        .filter-btn.active { background:#1e293b; color:white; border-color:#1e293b; }
        .stat-pill { text-align:center; padding:10px 18px; border-radius:10px; min-width:80px; }
        .action-btn { padding:4px 12px; border:1.5px solid #e2e8f0; border-radius:6px; font-size:0.78rem; font-weight:600; cursor:pointer; background:white; color:#374151; transition:background 0.12s; }
        .action-btn:hover { background:#f1f5f9; }
        .action-btn.blue { border-color:#bfdbfe; background:#eff6ff; color:#1d4ed8; }
        .action-btn.blue:hover { background:#dbeafe; }
    </style>
</head>
<body>
<nav>
    <a href="/" class="nav-logo"><img src="/logo-icon.svg" height="56" style="vertical-align:middle;margin-right:10px;">Remnant<span>Exchange</span><span style="color:#93c5fd;font-size:0.68em;font-weight:600;letter-spacing:0;">.org</span></a>
    <div class="nav-links">
        <span id="internGreeting" style="color:#94a3b8;font-size:0.85rem;"></span>
        <button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>

<div style="max-width:1100px;margin:0 auto;padding:32px 20px;">

    <!-- Header -->
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:16px;">
        <div>
            <h1 style="margin-bottom:4px;">Outreach Dashboard</h1>
            <p id="territoryLabel" style="color:#64748b;font-size:0.9rem;margin:0;"></p>
        </div>
        <div id="statBadges" style="display:flex;gap:10px;flex-wrap:wrap;"></div>
    </div>

    <!-- Alert box -->
    <div id="pageAlert" style="display:none;margin-bottom:16px;"></div>

    <!-- Search + Filters -->
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:20px;flex-wrap:wrap;">
        <input id="searchBox" type="text" placeholder="Search business, name, or email..." oninput="renderTable()"
            style="padding:8px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:0.9rem;outline:none;min-width:260px;flex:1;max-width:400px;">
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
            <button class="filter-btn active" id="filter_all" onclick="setFilter('all')">All</button>
            <button class="filter-btn" id="filter_new" onclick="setFilter('new')">New</button>
            <button class="filter-btn" id="filter_introduction" onclick="setFilter('introduction')">Intro Sent</button>
            <button class="filter-btn" id="filter_credentials" onclick="setFilter('credentials')">Credentials</button>
        </div>
    </div>

    <!-- Table -->
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Business</th>
                    <th>Contact</th>
                    <th>Phone</th>
                    <th>City</th>
                    <th>Status</th>
                    <th>Notes</th>
                    <th style="min-width:140px;">Actions</th>
                </tr>
            </thead>
            <tbody id="fabTableBody">
                <tr><td colspan="7" style="text-align:center;color:#94a3b8;padding:32px;">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Fabricator Detail Modal -->
<div id="fabModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;overflow-y:auto;" onclick="if(event.target===this)closeFabModal()">
    <div style="background:white;border-radius:16px;max-width:560px;margin:60px auto;padding:32px;position:relative;" onclick="event.stopPropagation()">
        <button onclick="closeFabModal()" style="position:absolute;top:16px;right:16px;background:none;border:none;font-size:1.5rem;cursor:pointer;color:#94a3b8;">&#10005;</button>
        <div id="fabModalContent"><p style="color:#94a3b8;">Loading...</p></div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (!token || user.role !== 'intern') window.location.href = '/login.html';

    document.getElementById('internGreeting').textContent = user.name || 'Intern';

    let allFabs = [];
    let activeFilter = 'all';
    let activeFabId = null;

    const STATUS_HTML = {
        new: '<span style="background:#f1f5f9;color:#64748b;font-size:0.75rem;font-weight:600;padding:2px 10px;border-radius:999px;">New</span>',
        introduction: '<span style="background:#fef9c3;color:#854d0e;font-size:0.75rem;font-weight:600;padding:2px 10px;border-radius:999px;">Intro Sent</span>',
        credentials: '<span style="background:#dcfce7;color:#15803d;font-size:0.75rem;font-weight:600;padding:2px 10px;border-radius:999px;">Credentials</span>',
        unsubscribed: '<span style="background:#fee2e2;color:#dc2626;font-size:0.75rem;font-weight:600;padding:2px 10px;border-radius:999px;">Unsubscribed</span>',
    };

    async function loadFabs() {
        try {
            const res = await fetch('/api/intern/fabricators', { headers: { Authorization: `Bearer ${token}` } });
            if (res.status === 401 || res.status === 403) { window.location.href = '/login.html'; return; }
            if (!res.ok) throw new Error('Failed to load');
            allFabs = await res.json();
            renderStats();
            renderTable();
            const total = allFabs.length;
            document.getElementById('territoryLabel').textContent = `${total} fabricator${total !== 1 ? 's' : ''} in your assigned territory`;
        } catch (err) {
            document.getElementById('fabTableBody').innerHTML = `<tr><td colspan="7" style="text-align:center;color:#ef4444;padding:32px;">Failed to load: ${err.message}</td></tr>`;
        }
    }

    function renderStats() {
        const counts = { new: 0, introduction: 0, credentials: 0 };
        allFabs.forEach(f => { if (counts[f.outreach_status] !== undefined) counts[f.outreach_status]++; });
        document.getElementById('statBadges').innerHTML = `
            <div class="stat-pill" style="background:#f1f5f9;">
                <div style="font-size:1.5rem;font-weight:800;">${counts.new}</div>
                <div style="font-size:0.72rem;color:#64748b;">New</div>
            </div>
            <div class="stat-pill" style="background:#fef9c3;">
                <div style="font-size:1.5rem;font-weight:800;color:#854d0e;">${counts.introduction}</div>
                <div style="font-size:0.72rem;color:#854d0e;">Intro Sent</div>
            </div>
            <div class="stat-pill" style="background:#dcfce7;">
                <div style="font-size:1.5rem;font-weight:800;color:#15803d;">${counts.credentials}</div>
                <div style="font-size:0.72rem;color:#15803d;">Credentials</div>
            </div>
        `;
    }

    function setFilter(f) {
        activeFilter = f;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`filter_${f}`).classList.add('active');
        renderTable();
    }

    function renderTable() {
        const q = (document.getElementById('searchBox').value || '').toLowerCase();
        const rows = allFabs.filter(f => {
            const matchFilter = activeFilter === 'all' || f.outreach_status === activeFilter;
            const matchSearch = !q ||
                (f.business_name || '').toLowerCase().includes(q) ||
                (f.name || '').toLowerCase().includes(q) ||
                (f.email || '').toLowerCase().includes(q);
            return matchFilter && matchSearch;
        });

        const tbody = document.getElementById('fabTableBody');
        if (!rows.length) {
            tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:#94a3b8;padding:24px;">No results</td></tr>`;
            return;
        }

        tbody.innerHTML = rows.map(f => `
            <tr style="cursor:pointer;" onclick="openFab('${f.id}')">
                <td><strong>${escHtml(f.business_name)}</strong></td>
                <td style="font-size:0.85rem;color:#64748b;">${escHtml(f.name)}</td>
                <td>${f.phone ? `<a href="tel:${escHtml(f.phone)}" style="color:#1e293b;text-decoration:none;" onclick="event.stopPropagation()">${escHtml(f.phone)}</a>` : '<span style="color:#cbd5e1;">—</span>'}</td>
                <td style="font-size:0.85rem;color:#64748b;">${escHtml(f.city || '—')}</td>
                <td>${STATUS_HTML[f.outreach_status] || ''}</td>
                <td style="font-size:0.8rem;color:#64748b;max-width:160px;">${f.admin_notes ? `<span title="${escAttr(f.admin_notes)}">${f.admin_notes.length > 40 ? escHtml(f.admin_notes.substring(0, 40)) + '…' : escHtml(f.admin_notes)}</span>` : ''}</td>
                <td onclick="event.stopPropagation()">
                    <button class="action-btn" onclick="quickIntro('${f.id}')">Intro</button>
                    <button class="action-btn blue" style="margin-left:4px;" onclick="quickCreds('${f.id}')">Creds</button>
                </td>
            </tr>
        `).join('');
    }

    function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function escAttr(s) { return String(s||'').replace(/"/g,'&quot;'); }

    function openFab(id) {
        activeFabId = id;
        const f = allFabs.find(x => x.id === id);
        if (!f) return;
        document.getElementById('fabModal').style.display = 'block';
        document.getElementById('fabModalContent').innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;flex-wrap:wrap;gap:8px;">
                <h2 style="margin:0;">${escHtml(f.business_name)}</h2>
                ${STATUS_HTML[f.outreach_status] || ''}
            </div>
            <p style="color:#64748b;margin-bottom:20px;">${escHtml(f.name)}</p>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">
                <div style="background:#f8fafc;border-radius:8px;padding:12px;">
                    <div style="font-size:0.72rem;color:#94a3b8;margin-bottom:2px;">EMAIL</div>
                    <a href="mailto:${escHtml(f.email)}" style="color:#1e293b;font-size:0.9rem;word-break:break-all;">${escHtml(f.email)}</a>
                </div>
                <div style="background:#f8fafc;border-radius:8px;padding:12px;">
                    <div style="font-size:0.72rem;color:#94a3b8;margin-bottom:2px;">PHONE</div>
                    <span style="font-size:0.9rem;">${f.phone ? `<a href="tel:${escHtml(f.phone)}" style="color:#1e293b;">${escHtml(f.phone)}</a>` : '—'}</span>
                </div>
                <div style="background:#f8fafc;border-radius:8px;padding:12px;">
                    <div style="font-size:0.72rem;color:#94a3b8;margin-bottom:2px;">CITY</div>
                    <span style="font-size:0.9rem;">${escHtml(f.city || '—')}</span>
                </div>
                <div style="background:#f8fafc;border-radius:8px;padding:12px;">
                    <div style="font-size:0.72rem;color:#94a3b8;margin-bottom:2px;">ACTIVE LISTINGS</div>
                    <span style="font-size:0.9rem;font-weight:600;">${Number(f.active_listings) || 0}</span>
                </div>
            </div>

            <div style="margin-bottom:20px;">
                <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:6px;">Notes</label>
                <textarea id="modalNotes" rows="3" style="width:100%;padding:10px;border:1px solid #e2e8f0;border-radius:8px;font-size:0.9rem;resize:vertical;font-family:inherit;box-sizing:border-box;">${escHtml(f.admin_notes || '')}</textarea>
                <button class="btn btn-primary btn-sm" style="margin-top:8px;" onclick="saveNotes('${f.id}')">Save Notes</button>
                <span id="notesSavedMsg" style="margin-left:10px;color:#16a34a;font-size:0.85rem;display:none;">Saved ✓</span>
            </div>

            <div id="modalAlert" style="display:none;margin-bottom:12px;"></div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;">
                <button class="btn btn-secondary" id="modalIntroBtn" onclick="sendIntro('${f.id}')">Send Introduction Email</button>
                <button class="btn btn-primary" id="modalCredsBtn" onclick="sendCreds('${f.id}')">Send Credentials Email</button>
            </div>
        `;
    }

    function closeFabModal() {
        document.getElementById('fabModal').style.display = 'none';
        activeFabId = null;
    }

    async function saveNotes(id) {
        const notes = document.getElementById('modalNotes').value.trim();
        try {
            const res = await fetch(`/api/intern/fabricators/${id}/notes`, {
                method: 'PATCH',
                headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ notes }),
            });
            if (res.ok) {
                document.getElementById('notesSavedMsg').style.display = 'inline';
                setTimeout(() => { const el = document.getElementById('notesSavedMsg'); if(el) el.style.display='none'; }, 2000);
                const f = allFabs.find(x => x.id === id);
                if (f) { f.admin_notes = notes; renderTable(); }
            }
        } catch {}
    }

    async function sendIntro(id) {
        const f = allFabs.find(x => x.id === id);
        if (!confirm(`Send introduction email to ${f ? f.business_name : id}?`)) return;
        const btn = document.getElementById('modalIntroBtn');
        const alertBox = document.getElementById('modalAlert');
        btn.disabled = true; btn.textContent = 'Sending...';
        try {
            const res = await fetch(`/api/intern/fabricators/${id}/send-introduction`, {
                method: 'POST', headers: { Authorization: `Bearer ${token}` }
            });
            const data = await res.json();
            if (res.ok) {
                btn.textContent = 'Intro Sent ✓'; btn.style.color = '#16a34a';
                if (f) { f.outreach_status = 'introduction'; renderStats(); renderTable(); openFab(id); }
            } else {
                alertBox.className = 'alert alert-error'; alertBox.textContent = data.error || 'Failed';
                alertBox.style.display = 'block'; btn.disabled = false; btn.textContent = 'Send Introduction Email';
            }
        } catch {
            alertBox.className = 'alert alert-error'; alertBox.textContent = 'Network error';
            alertBox.style.display = 'block'; btn.disabled = false; btn.textContent = 'Send Introduction Email';
        }
    }

    async function sendCreds(id) {
        const f = allFabs.find(x => x.id === id);
        if (!confirm(`Send login credentials to ${f ? f.email : id}?`)) return;
        const btn = document.getElementById('modalCredsBtn');
        const alertBox = document.getElementById('modalAlert');
        btn.disabled = true; btn.textContent = 'Sending...';
        try {
            const res = await fetch(`/api/intern/fabricators/${id}/send-credentials`, {
                method: 'POST', headers: { Authorization: `Bearer ${token}` }
            });
            const data = await res.json();
            if (res.ok) {
                btn.textContent = 'Credentials Sent ✓'; btn.style.color = '#16a34a';
                if (f) { f.outreach_status = 'credentials'; renderStats(); renderTable(); openFab(id); }
            } else {
                alertBox.className = 'alert alert-error'; alertBox.textContent = data.error || 'Failed';
                alertBox.style.display = 'block'; btn.disabled = false; btn.textContent = 'Send Credentials Email';
            }
        } catch {
            alertBox.className = 'alert alert-error'; alertBox.textContent = 'Network error';
            alertBox.style.display = 'block'; btn.disabled = false; btn.textContent = 'Send Credentials Email';
        }
    }

    async function quickIntro(id) {
        const f = allFabs.find(x => x.id === id);
        if (!confirm(`Send introduction email to ${f ? f.business_name : id}?`)) return;
        try {
            const res = await fetch(`/api/intern/fabricators/${id}/send-introduction`, {
                method: 'POST', headers: { Authorization: `Bearer ${token}` }
            });
            const data = await res.json();
            if (res.ok) { if (f) { f.outreach_status = 'introduction'; renderStats(); renderTable(); } }
            else alert(data.error || 'Failed to send');
        } catch { alert('Network error'); }
    }

    async function quickCreds(id) {
        const f = allFabs.find(x => x.id === id);
        if (!confirm(`Send credentials to ${f ? f.email : id}?`)) return;
        try {
            const res = await fetch(`/api/intern/fabricators/${id}/send-credentials`, {
                method: 'POST', headers: { Authorization: `Bearer ${token}` }
            });
            const data = await res.json();
            if (res.ok) { if (f) { f.outreach_status = 'credentials'; renderStats(); renderTable(); } }
            else alert(data.error || 'Failed to send');
        } catch { alert('Network error'); }
    }

    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = '/login.html';
    }

    loadFabs();
</script>
</body>
</html>

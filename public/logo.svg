<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <!-- Icon: stone slab shape -->
  <rect x="0" y="10" width="80" height="80" rx="14" fill="#1e293b"/>
  <!-- Stone slab 1 (background) -->
  <rect x="14" y="32" width="38" height="42" rx="4" fill="#334155"/>
  <!-- Stone slab 2 (foreground, offset) -->
  <rect x="28" y="22" width="38" height="42" rx="4" fill="#3b82f6"/>
  <!-- Subtle grain lines on foreground slab -->
  <line x1="33" y1="30" x2="60" y2="30" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="33" y1="37" x2="60" y2="37" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-linecap="round"/>
  <line x1="33" y1="43" x2="55" y2="43" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="96" y="52" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="800" fill="#1e293b" letter-spacing="-0.03em">Remnant</text>
  <text x="96" y="80" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="500" fill="#3b82f6" letter-spacing="0.05em">EXCHANGE</text>
</svg>

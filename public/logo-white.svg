<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100">
  <!-- Icon background -->
  <rect x="0" y="10" width="80" height="80" rx="14" fill="#1e3a5f"/>

  <!-- Left piece (dark slate) -->
  <path d="M10,22 L37,22 L33,34 L39,46 L33,58 L37,70 L10,70 Z" fill="#334155"/>
  <line x1="14" y1="34" x2="30" y2="34" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="46" x2="32" y2="46" stroke="rgba(255,255,255,0.1)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="14" y1="58" x2="30" y2="58" stroke="rgba(255,255,255,0.1)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Right piece (blue) -->
  <path d="M43,22 L70,22 L70,70 L43,70 L39,58 L45,46 L39,34 L43,22 Z" fill="#3b82f6"/>
  <line x1="47" y1="34" x2="67" y2="34" stroke="rgba(255,255,255,0.22)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="47" y1="46" x2="67" y2="46" stroke="rgba(255,255,255,0.15)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="47" y1="58" x2="67" y2="58" stroke="rgba(255,255,255,0.15)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Wordmark — white text for dark backgrounds -->
  <text x="100" y="54" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="800" fill="#f8fafc" letter-spacing="-0.03em">Remnant</text>
  <text x="100" y="80" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="500" fill="#60a5fa" letter-spacing="0.06em">EXCHANGE</text>
</svg>

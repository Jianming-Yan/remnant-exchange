  <line x1="4" y1="34" x2="30" y2="34" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="4" y1="48" x2="27" y2="48" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" stroke-linecap="round"/>

